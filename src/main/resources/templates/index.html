<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Recipe Logger</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .ingredient-card {
            cursor: pointer;
            transition: transform 0.2s;
            border-radius: 16px;
        }
        .ingredient-card:hover {
            transform: scale(1.05);
        }
        .recipe-dropdown {
            display: none;
            margin-top: 10px;
        }
        .recipe-dropdown.show {
            display: block;
        }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">🍽️ Recipe Logger</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="/">Home</a>
            <a class="nav-link" href="/recipes">All Recipes</a>
            <a class="nav-link" href="/recipes/new">Add Recipe</a>
            <a class="nav-link" href="/ingredients">Ingredients</a>
            <a class="nav-link" href="/categories">Categories</a>
            <a class="nav-link" href="/shopping">Shopping List</a>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <h2 class="mb-2">What do you want to cook with?</h2>
    <p class="text-muted mb-4">Click an ingredient to see matching recipes</p>

    <div class="row g-3">
        <div th:each="ingredient : ${ingredients}" class="col-6 col-md-3 col-lg-2">
            <div class="card ingredient-card shadow-sm text-center p-3"
                 th:onclick="|toggleRecipes(${ingredient.id})|">
                <div style="font-size: 2rem;">🥘</div>
                <div class="fw-bold mt-2" th:text="${ingredient.name}"></div>
                <div class="text-muted small" th:text="${ingredient.type}"></div>
            </div>

            <div th:id="|recipes-${ingredient.id}|" class="recipe-dropdown">
                <div class="list-group">
                    <div th:each="ri : ${recipeMap[ingredient.id]}"
                         class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">
                        <span th:text="${ri.recipe.title}"></span>
                        <a th:href="@{/recipes/{id}(id=${ri.recipe.id})}"
                           class="btn btn-sm btn-dark">View</a>
                    </div>
                    <div th:if="${#lists.isEmpty(recipeMap[ingredient.id])}"
                         class="list-group-item text-muted">
                        No recipes yet
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function toggleRecipes(ingredientId) {
        const dropdown = document.getElementById('recipes-' + ingredientId);
        dropdown.classList.toggle('show');
    }
</script>
</body>
</html>
