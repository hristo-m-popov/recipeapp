<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ingredients - Recipe Logger</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">🍽️ Recipe Logger</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="/">Home</a>
            <a class="nav-link" href="/recipes">All Recipes</a>
            <a class="nav-link" href="/recipes/new">Add Recipe</a>
            <a class="nav-link active" href="/ingredients">Ingredients</a>
            <a class="nav-link" href="/categories">Categories</a>
            <a class="nav-link" href="/shopping">Shopping List</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Ingredients</h2>
        <a href="/ingredients/new" class="btn btn-dark">+ Add Ingredient</a>
    </div>

    <form method="get" action="/ingredients" class="row g-2 mb-4">
        <div class="col-md-3">
            <input type="text" name="name" class="form-control"
                   placeholder="Search by name..." th:value="${name}">
        </div>
        <div class="col-md-3">
            <input type="text" name="type" class="form-control"
                   placeholder="Search by type..." th:value="${type}">
        </div>
        <div class="col-md-2">
            <select name="sortBy" class="form-select">
                <option value="name" th:selected="${sortBy == 'name'}">Name</option>
                <option value="type" th:selected="${sortBy == 'type'}">Type</option>
            </select>
        </div>
        <div class="col-md-1">
            <select name="direction" class="form-select">
                <option value="asc" th:selected="${direction == 'asc'}">↑</option>
                <option value="desc" th:selected="${direction == 'desc'}">↓</option>
            </select>
        </div>
        <div class="col-md-2">
            <button type="submit" class="btn btn-dark w-100">Search</button>
        </div>
    </form>

    <div class="table-responsive">
        <table class="table table-striped table-hover bg-white">
            <thead class="table-dark">
            <tr>
                <th>Name</th>
                <th>Type</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="ingredient : ${ingredients.content}">
                <td th:text="${ingredient.name}"></td>
                <td th:text="${ingredient.type}"></td>
                <td>
                    <a th:href="@{/ingredients/{id}/edit(id=${ingredient.id})}"
                       class="btn btn-sm btn-outline-dark">Edit</a>
                    <a th:href="@{/ingredients/{id}/delete(id=${ingredient.id})}"
                       class="btn btn-sm btn-danger"
                       onclick="return confirm('Delete this ingredient?')">Delete</a>
                </td>
            </tr>
            <tr th:if="${ingredients.content.empty}">
                <td colspan="3" class="text-center text-muted">No ingredients found.</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
