<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Recipe Form - Recipe Logger</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">🍽️ Recipe Logger</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="/">Home</a>
            <a class="nav-link" href="/recipes">All Recipes</a>
            <a class="nav-link active" href="/recipes/new">Add Recipe</a>
            <a class="nav-link" href="/ingredients">Ingredients</a>
            <a class="nav-link" href="/categories">Categories</a>
            <a class="nav-link" href="/shopping">Shopping List</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-header bg-dark text-white">
                    <h5 class="mb-0"
                        th:text="${recipe.id == null} ? 'Add New Recipe' : 'Edit Recipe'"></h5>
                </div>
                <div class="card-body">
                    <form method="post" action="/recipes/save">
                        <input type="hidden" name="id" th:value="${recipe.id}">

                        <div class="mb-3">
                            <label class="form-label">Title *</label>
                            <input type="text" name="title" class="form-control"
                                   th:value="${recipe.title}" maxlength="50" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Category</label>
                            <select name="category.id" class="form-select">
                                <option value="">-- No Category --</option>
                                <option th:each="cat : ${categories}"
                                        th:value="${cat.id}"
                                        th:text="${cat.name}"
                                        th:selected="${recipe.category != null
                              and recipe.category.id != null
                              and recipe.category.id == cat.id}">
                                </option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <textarea name="description" class="form-control"
                                      rows="2" maxlength="500"
                                      th:text="${recipe.description}"></textarea>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Steps *</label>
                            <textarea name="steps" class="form-control"
                                      rows="4" maxlength="500" required
                                      th:text="${recipe.steps}"></textarea>
                        </div>

                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Portions</label>
                                <input type="number" name="portions" class="form-control"
                                       th:value="${recipe.portions}" min="1" max="10">
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Price</label>
                                <input type="number" name="price" class="form-control"
                                       th:value="${recipe.price}" min="0" step="0.01">
                            </div>
                            <div class="col-md-4 mb-3">
                                <label class="form-label">Rating (1-10)</label>
                                <input type="number" name="rating" class="form-control"
                                       th:value="${recipe.rating}" min="1" max="10">
                            </div>
                        </div>

                        <div class="mb-3">
                            <div class="form-check">
                                <input type="checkbox" name="favorite" value="true"
                                       class="form-check-input"
                                       th:checked="${recipe.favorite == true}">
                                <label class="form-check-label">⭐ Mark as Favourite</label>
                            </div>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-dark">Save Recipe</button>
                            <a href="/recipes" class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
