<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Shopping Form - Recipe Logger</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">🍽️ Recipe Logger</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="/">Home</a>
            <a class="nav-link" href="/recipes">All Recipes</a>
            <a class="nav-link" href="/recipes/new">Add Recipe</a>
            <a class="nav-link" href="/ingredients">Ingredients</a>
            <a class="nav-link" href="/categories">Categories</a>
            <a class="nav-link active" href="/shopping">Shopping List</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header bg-dark text-white">
                    <h5 class="mb-0"
                        th:text="${item.id == null} ? 'Add Shopping Item' : 'Edit Shopping Item'"></h5>
                </div>
                <div class="card-body">
                    <form method="post" action="/shopping/save">
                        <input type="hidden" name="id" th:value="${item.id}">

                        <div class="mb-3">
                            <label class="form-label">Ingredient *</label>
                            <select name="ingredient.id" class="form-select" required>
                                <option value="">-- Select Ingredient --</option>
                                <option th:each="ingredient : ${ingredients}"
                                        th:value="${ingredient.id}"
                                        th:text="${ingredient.name}"
                                        th:selected="${item.ingredient != null
                                                      and item.ingredient.id != null
                                                      and item.ingredient.id == ingredient.id}">
                                </option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Quantity</label>
                            <input type="number" name="quantity" class="form-control"
                                   th:value="${item.quantity}" min="0" step="0.1">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Unit</label>
                            <input type="text" name="unit" class="form-control"
                                   th:value="${item.unit}" placeholder="e.g. grams, cups, ml">
                        </div>

                        <div class="mb-3">
                            <div class="form-check">
                                <input type="checkbox" name="purchased" value="true"
                                       class="form-check-input"
                                       th:checked="${item.purchased == true}">
                                <label class="form-check-label">Already Purchased</label>
                            </div>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-dark">Save</button>
                            <a href="/shopping" class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
